name: Pipeline de Integração Contínua (CI)

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  ci-pipeline:
    name: Executar CI & SonarQube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para o SonarQube ter o histórico do git completo

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar Dependências
        run: npm install

      - name: Executar Prettier (Formatação)
        run: npm run format

      - name: Executar ESLint (Linter)
        run: npm run lint

      - name: Executar Jest & Supertest com Coverage
        run: npm run test:coverage

      - name: Executar Testes de Performance (Login)
        run: npm run test:perf

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
